<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard — Word Quest Arena</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrap">

  <div class="brand">
    <div class="mascot-frame">
      <svg class="mascot" viewBox="0 0 100 100" width="100" height="100" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="58" rx="34" ry="30" fill="#FFC93C"/>
        <circle cx="50" cy="34" r="26" fill="#FFC93C"/>
        <circle cx="38" cy="32" r="12" fill="#fff"/>
        <circle cx="62" cy="32" r="12" fill="#fff"/>
        <circle cx="38" cy="32" r="5" fill="#2D3250"/>
        <circle cx="62" cy="32" r="5" fill="#2D3250"/>
        <polygon points="50,38 44,48 56,48" fill="#7C6BB5"/>
      </svg>
    </div>
    <div class="brand-text">
      <h1 class="display">Hall of Fame</h1>
      <p class="tag">Top Word Quest champions</p>
    </div>
  </div>

  <div class="card">
    <div id="boardArea">
      <div class="state-msg">
        <div class="spinner"></div>
        Loading leaderboard...
      </div>
    </div>
  </div>

  <button class="btn ghost" onclick="window.location.href='index.html'">← Back to Start</button>

</div>

<script src="js/api.js"></script>
<script src="js/leaderboard.js"></script>
</body>
</html>
