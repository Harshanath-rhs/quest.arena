<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playing — Word Quest Arena</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrap">

  <div class="hud">
    <div class="hud-item">
      <div class="val" id="hudName">—</div>
      <div class="lbl">Player</div>
    </div>
    <div class="hud-item">
      <div class="val" id="hudScore">0</div>
      <div class="lbl">Score</div>
    </div>
    <div class="hud-item streak">
      <div class="val" id="hudStreak">0</div>
      <div class="lbl">Streak</div>
    </div>
    <div class="hud-item timer">
      <div class="val" id="hudTimer">15</div>
      <div class="lbl">Seconds</div>
    </div>
  </div>

  <div class="quest-path" id="questPath"></div>

  <div id="gameArea">
    <div class="state-msg" id="loadingMsg">
      <div class="spinner"></div>
      Loading questions...
    </div>
  </div>

  <div class="mascot-row">
    <div class="mascot-frame">
      <svg class="mascot" viewBox="0 0 100 100" width="100" height="100" xmlns="http://www.w3.org/2000/svg" id="mascotSvg">
        <ellipse cx="50" cy="58" rx="34" ry="30" fill="#7C6BB5"/>
        <circle cx="50" cy="34" r="26" fill="#7C6BB5"/>
        <circle cx="38" cy="32" r="12" fill="#fff"/>
        <circle cx="62" cy="32" r="12" fill="#fff"/>
        <circle cx="38" cy="32" r="5" fill="#2D3250" id="eyeL"/>
        <circle cx="62" cy="32" r="5" fill="#2D3250" id="eyeR"/>
        <polygon points="50,38 44,48 56,48" fill="#FFC93C"/>
        <polygon points="18,20 30,26 20,34" fill="#7C6BB5"/>
        <polygon points="82,20 70,26 80,34" fill="#7C6BB5"/>
      </svg>
    </div>
    <div class="speech-bubble" id="speechBubble">Ready? Pick your answer!</div>
  </div>

</div>

<script src="js/api.js"></script>
<script src="js/questions.js"></script>
<script src="js/game.js"></script>
</body>
</html>
