<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Quest Arena</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrap">

  <div class="brand">
    <svg class="mascot" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="50" cy="58" rx="34" ry="30" fill="#7C6BB5"/>
      <circle cx="50" cy="34" r="26" fill="#7C6BB5"/>
      <circle cx="38" cy="32" r="12" fill="#fff"/>
      <circle cx="62" cy="32" r="12" fill="#fff"/>
      <circle cx="38" cy="32" r="5" fill="#2D3250"/>
      <circle cx="62" cy="32" r="5" fill="#2D3250"/>
      <polygon points="50,38 44,48 56,48" fill="#FFC93C"/>
      <polygon points="18,20 30,26 20,34" fill="#7C6BB5"/>
      <polygon points="82,20 70,26 80,34" fill="#7C6BB5"/>
    </svg>
    <div class="brand-text">
      <h1 class="display">Word Quest Arena</h1>
      <p class="tag">An English adventure for sharp minds</p>
    </div>
  </div>

  <div class="card">
    <h2 style="font-size:1.15rem;margin-bottom:16px;">Enter the Arena</h2>

    <div class="error-msg" id="loginError"></div>

    <form id="loginForm" autocomplete="off">
      <div class="field">
        <label for="name">Your name</label>
        <input type="text" id="name" placeholder="e.g. Kasun" required>
      </div>
      <div class="field">
        <label for="className">Your class</label>
        <input type="text" id="className" placeholder="e.g. Grade 5B" required>
      </div>
      <div class="field">
        <label for="pin">Your secret PIN</label>
        <input type="text" id="pin" inputmode="numeric" placeholder="e.g. 1234" required>
      </div>

      <div class="field">
        <label>Choose your quest level</label>
        <div class="level-grid" id="levelGrid">
          <div class="level-door active" data-level="Easy">
            <span class="emoji">🌱</span>Easy
          </div>
          <div class="level-door" data-level="Medium">
            <span class="emoji">⚔️</span>Medium
          </div>
          <div class="level-door" data-level="Hard">
            <span class="emoji">🔥</span>Hard
          </div>
        </div>
      </div>

      <button type="submit" class="btn mt" id="loginBtn">Start the Quest</button>
    </form>
  </div>

  <p class="center muted">Don't know your PIN? Ask your teacher.</p>
  <p class="center muted"><a href="leaderboard.html" style="color:var(--grape);">🏆 View Leaderboard</a></p>

</div>

<script src="js/api.js"></script>
<script src="js/login.js"></script>
</body>
</html>
